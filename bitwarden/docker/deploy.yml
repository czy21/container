version: "3.9"

services:
  web:
    image: bitwarden/web:latest
    container_name: bitwarden-web
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/conf/web/:/etc/bitwarden/web/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env

  attachments:
    image: bitwarden/attachments:latest
    container_name: bitwarden-attachments
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/conf/core/attachments/:/etc/bitwarden/core/attachments/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env

  api:
    image: bitwarden/api:latest
    container_name: bitwarden-api
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/conf/core/:/etc/bitwarden/core/
      - /volume5/storage/docker-data/bitwarden/logs/api/:/etc/bitwarden/logs/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env
      - /volume5/storage/docker-data/bitwarden/conf/env/global.override.env

  identity:
    image: bitwarden/identity:latest
    container_name: bitwarden-identity
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/conf/identity/:/etc/bitwarden/identity/
      - /volume5/storage/docker-data/bitwarden/conf/core/:/etc/bitwarden/core/
      - /volume5/storage/docker-data/bitwarden/logs/identity/:/etc/bitwarden/logs/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env
      - /volume5/storage/docker-data/bitwarden/conf/env/global.override.env

  sso:
    image: bitwarden/sso:latest
    container_name: bitwarden-sso
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/conf/identity/:/etc/bitwarden/identity/
      - /volume5/storage/docker-data/bitwarden/conf/core/:/etc/bitwarden/core/
      - /volume5/storage/docker-data/bitwarden/logs/sso/:/etc/bitwarden/logs/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env
      - /volume5/storage/docker-data/bitwarden/conf/env/global.override.env

  admin:
    image: bitwarden/admin:latest
    container_name: bitwarden-admin
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/conf/core/:/etc/bitwarden/core/
      - /volume5/storage/docker-data/bitwarden/logs/admin/:/etc/bitwarden/logs/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env
      - /volume5/storage/docker-data/bitwarden/conf/env/global.override.env

  icons:
    image: bitwarden/icons:latest
    container_name: bitwarden-icons
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/logs/icons/:/etc/bitwarden/logs/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env

  notifications:
    image: bitwarden/notifications:latest
    container_name: bitwarden-notifications
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/logs/notifications/:/etc/bitwarden/logs/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env
      - /volume5/storage/docker-data/bitwarden/conf/env/global.override.env

  events:
    image: bitwarden/events:latest
    container_name: bitwarden-events
    restart: always
    volumes:
      - /volume5/storage/docker-data/bitwarden/logs/events/:/etc/bitwarden/logs/
    env_file:
      - /volume5/storage/docker-data/bitwarden/conf/env/global.env
      - /volume5/storage/docker-data/bitwarden/conf/env/uid.env
      - /volume5/storage/docker-data/bitwarden/conf/env/global.override.env