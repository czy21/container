x-traefik-label: &traefik-label
  traefik.enable: true
  traefik.http.routers.termix.service: termix
  traefik.http.services.termix.loadbalancer.server.port: 8080

services:
  termix:
    image: lukegus/termix # ghcr.io/lukegus/termix
    container_name: termix
    labels:
      <<: *traefik-label
    volumes:
      - /volume5/storage/docker-data/termix/data/:/app/data
    environment:
      LOG_LEVEL: info
      ENABLE_GUACAMOLE: false
    restart: always