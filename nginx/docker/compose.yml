version: "3.9"

services:
  nginx:
    image: nginx:1.29.0-alpine
    container_name: nginx
    privileged: true
    user: root
    network_mode: host
    volumes:
      - /volume5/storage/docker-data/nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - /volume5/storage/docker-data/nginx/conf/conf.d/:/etc/nginx/conf.d/
      - /volume5/storage/docker-data/nginx/conf/snippets/:/etc/nginx/snippets/
      - /volume5/storage/docker-data/nginx/conf/cert/:/etc/nginx/cert/
      - /volume5/storage/docker-data/nginx/static/:/usr/share/nginx/static/
    restart: always