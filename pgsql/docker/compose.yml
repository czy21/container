version: "3.9"

x-traefik-exporter-label: &traefik-exporter-label
  traefik.enable: true
  traefik.http.routers.pgsql-exporter-5432.service: pgsql-exporter-5432
  traefik.http.services.pgsql-exporter-5432.loadbalancer.server.port: 9187

services:
  pgsql:
    image: postgres:14.18-alpine
    container_name: pgsql
    privileged: true
    user: root
    ports:
      - "5432:5432"
    volumes:
      - /volume5/storage/docker-data/pgsql/conf/postgresql.conf:/etc/postgresql/postgresql.conf
      - /volume5/storage/docker-data/pgsql/data/:/var/lib/postgresql/data/
    command: -c config_file=/etc/postgresql/postgresql.conf
    environment:
      TZ: Asia/Shanghai
      POSTGRES_PASSWORD: "<secret_value>"
    restart: always
  pgsql-exporter-5432:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: pgsql-exporter-5432
    labels:
      <<: *traefik-exporter-label
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:<secret_value>@pgsql:5432/postgres?sslmode=disable"
    restart: always