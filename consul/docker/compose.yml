version: "3.9"

x-traefik-label: &traefik-label
  traefik.enable: true
  traefik.http.routers.consul.service: consul
  traefik.http.services.consul.loadbalancer.server.port: 8500

services:

  consul:
    image: hashicorp/consul:1.22.6
    container_name: consul
    labels:
      <<: *traefik-label
    privileged: true
    user: root
    ports:
      - "8500:8500"
    volumes:
      - /volume5/storage/docker-data/consul/data/:/consul/data/
      - /volume5/storage/docker-data/consul/conf/:/consul/config/
    command: 'agent -server -ui -node=server-1 -bootstrap-expect=1 -client=0.0.0.0 -datacenter=default'
    restart: always