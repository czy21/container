version: "3.9"

x-traefik-label: &traefik-label
  traefik.enable: true
  traefik.http.routers.emby.service: emby
  traefik.http.services.emby.loadbalancer.server.port: 8096

services:
  emby:
    image: docker.io/czy21/emby
    pull_policy: always
    container_name: emby
    hostname: emby
    labels:
      <<: *traefik-label
    expose:
      - "8096"
      - "8920"
    volumes:
      - /volume5/storage/docker-data/emby/data/:/config/
      - /volume5/public/media/:/media/
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Shanghai
    devices:
      - /dev/dri:/dev/dri
    restart: always